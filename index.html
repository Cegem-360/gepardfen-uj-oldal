<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gepárd-FEN — B2B alkatrész portál</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style id="gf-base-styles"></style>
</head>
<body>
  <div id="root"></div>

  <!-- Inline stylesheet injection — runs once before React mounts -->
  <script>
    // We need the gfStyles string from ui-base.jsx. We'll set it in a small bootstrap below.
  </script>

  <!-- Tweaks panel host -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui-base.jsx"></script>
  <script type="text/babel">
    // Inject base styles after ui-base.jsx loads
    document.getElementById("gf-base-styles").textContent = window.gfStyles;
  </script>
  <script type="text/babel" src="header.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="category.jsx"></script>
  <script type="text/babel" src="product.jsx"></script>
  <script type="text/babel" src="modals.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
